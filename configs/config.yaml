# =============================================================================
# Event-Centric Multi-Document News Summarization — Project Configuration
# =============================================================================

# --- Data Collection (Section 5.1) ---
newsapi:
  categories:
    - business
    - entertainment
    - general
    - health
    - science
    - sports
    - technology
  country: "us"
  language: "en"
  page_size: 100

# --- Multi-News Pipeline Input (Section 5.1.1) ---
multinews:
  repo_id: "tingchih/multi_news_doc"
  split: "test"
  subset_size: 300              # Number of clusters to keep from the split
  separator: "|||||"            # Article separator within the `document` field
  summary_prefix: "– "          # Prefix to strip from reference summaries (en-dash + space)

# --- CNN/Daily Mail Training Data Prep (Section ⚙️ Training Environment) ---
cnn_dm:
  repo_id: "abisee/cnn_dailymail"
  version: "3.0.0"
  n_train: 50000                # 50K subset for Colab free tier; smoke test uses 5K
  n_val: 1000
  n_test: 1000
  min_article_words: 50         # Drop degenerate examples under this threshold
  stage2_separator: "\n"        # Joiner between headline prefix and article body

# --- Semantic Embeddings (Section 5.2) ---
embeddings:
  model_name: "all-MiniLM-L6-v2"
  snippet_sentences: 3          # Number of leading sentences to combine with title
  embedding_dim: 384

# --- Clustering (Section 5.3) ---
clustering:
  hdbscan:
    min_cluster_size: 2           # Picked by silhouette sweep in 02_clustering.ipynb (0.094 vs 0.077 at 3)
    metric: "cosine"              # Implemented as euclidean on L2-normalized vectors (monotonic equivalent)
  kmeans:
    n_clusters: 20              # Baseline comparison
  min_articles_per_cluster: 2   # Discard singleton clusters and noise

# --- Multi-Document Input Construction (Section 5.4) ---
input_construction:
  max_input_tokens: 1024
  sentences_per_article: 3      # Prioritize first 2-3 sentences per article
  order_by: "published_at"      # Concatenation order

# --- BART Fine-Tuning (Section 5.5) ---
summarization:
  model_name: "facebook/bart-large-cnn"

  # Stage 1 — Headline Generation
  stage1:
    max_input_tokens: 1024
    max_output_tokens: 48       # Raised from 30 per EDA findings (p50 headline ≈ 30 tokens, p95 ≈ 50)

  # Stage 2 — Summary Generation
  stage2:
    max_input_tokens: 1024
    max_output_tokens: 128

  # Training Configuration (tuned for Colab free tier T4 GPU, ~15GB VRAM)
  training:
    optimizer: "adamw"
    learning_rate: 2.0e-5
    warmup_steps: 500
    batch_size: 4                    # Reduced from 8 to fit BART-large on T4
    gradient_accumulation_steps: 8   # Keeps effective batch size at 32
    epochs: 3
    fp16: true                       # Mixed-precision training — halves memory, faster on T4
    gradient_checkpointing: true     # Trades compute for memory (recomputes activations in backward)

# --- Generation Parameters (BART inference, Stage 1 — headline) ---
generation:
  num_beams: 4
  min_length: 5                   # Guards against trivial / degenerate outputs
  length_penalty: 1.0             # Neutral; headlines are short so no bias toward length
  no_repeat_ngram_size: 3
  early_stopping: true

# --- Generation Parameters (BART inference, Stage 2 — summary) ---
# Summaries want longer, fuller output than headlines.
generation_stage2:
  num_beams: 4
  min_length: 30                  # Floor ~30 tokens so summaries aren't truncated to a headline
  length_penalty: 2.0             # BART's published CNN/DM summarization default
  no_repeat_ngram_size: 3
  early_stopping: true

# --- Named Entity Recognition (Section 5.6) ---
ner:
  spacy_model: "en_core_web_trf"
  entity_types:
    - PERSON
    - ORG
    - GPE
    - DATE
    - EVENT

# --- Evaluation (Section 6) ---
evaluation:
  rouge_types:
    - rouge1
    - rouge2
    - rougeL
  bertscore_model: "roberta-large"
  human_eval_sample_size: 100

# --- Directory Paths ---
paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_multinews: "data/processed/multi_news"
  data_cnn_dm: "data/processed/cnn_dailymail"
  data_embeddings: "data/embeddings"
  data_clusters: "data/clusters"
  model_checkpoints: "models/checkpoints"
  model_results: "models/results"
